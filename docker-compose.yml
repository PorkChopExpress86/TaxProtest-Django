services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taxprotest}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: ${POSTGRES_DB:-taxprotest}
    ports:
      - "127.0.0.1:6385:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        # Default 1 = skip data download (fast dev/CI builds).
        # Set SKIP_DATA_DOWNLOAD=0 to bake HCAD data into the image (production).
        SKIP_DATA_DOWNLOAD: ${SKIP_DATA_DOWNLOAD:-1}
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8020:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-0}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,property.ohmygoshwhatever.com}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://property.ohmygoshwhatever.com}
      - USE_X_FORWARDED_HOST=${USE_X_FORWARDED_HOST:-1}
      - ENABLE_SECURE_PROXY_SSL_HEADER=${ENABLE_SECURE_PROXY_SSL_HEADER:-1}
      - FORCE_SECURE_COOKIES=${FORCE_SECURE_COOKIES:-1}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-3}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
      - HCAD_LOG_DIR=${HCAD_LOG_DIR:-/app/var/logs}
      - PROJECT_REPORT_DIR=${PROJECT_REPORT_DIR:-/app/var/reports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      # /hcad_downloads_baked lives outside /app in the image so the .:/app
      # bind-mount never touches it. The entrypoint syncs it to /app/var/downloads.

  # Celery worker for processing background tasks
  worker:
    build:
      context: .
      args:
        SKIP_DATA_DOWNLOAD: ${SKIP_DATA_DOWNLOAD:-1}
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
      - HCAD_LOG_DIR=${HCAD_LOG_DIR:-/app/var/logs}
      - PROJECT_REPORT_DIR=${PROJECT_REPORT_DIR:-/app/var/reports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A taxprotest worker --loglevel=info

  # Celery beat for scheduled tasks (runs monthly imports)
  beat:
    build:
      context: .
      args:
        SKIP_DATA_DOWNLOAD: ${SKIP_DATA_DOWNLOAD:-1}
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
      - HCAD_LOG_DIR=${HCAD_LOG_DIR:-/app/var/logs}
      - PROJECT_REPORT_DIR=${PROJECT_REPORT_DIR:-/app/var/reports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A taxprotest beat --loglevel=info

  # Lightweight dev service for linting, type checking, and testing.
  # Never downloads HCAD data. Bypasses the entrypoint so commands run directly.
  taxprotest-dev:
    build:
      context: .
      args:
        SKIP_DATA_DOWNLOAD: "1"
    profiles: ["devtools"]
    user: "${UID:-1000}:${GID:-1000}"
    entrypoint: []
    volumes:
      - .:/app
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-change-this-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:-taxprotest}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - DEBUG=1
      - XDG_CACHE_HOME=/tmp/.cache
      - RUFF_CACHE_DIR=/tmp/.ruff_cache
      - MYPY_CACHE_DIR=/tmp/.mypy_cache
      - PYTEST_ADDOPTS=-o cache_dir=/tmp/.pytest_cache
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
    depends_on:
      postgres:
        condition: service_healthy

  # One-off ingestion service for full import workflows.
  ingest:
    build:
      context: .
      args:
        SKIP_DATA_DOWNLOAD: ${SKIP_DATA_DOWNLOAD:-1}
    profiles: ["jobs"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:-taxprotest}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-change-this-in-production}
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
      - HCAD_LOG_DIR=${HCAD_LOG_DIR:-/app/var/logs}
      - PROJECT_REPORT_DIR=${PROJECT_REPORT_DIR:-/app/var/reports}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py import_all_data

  # One-off refresh orchestration service.
  refresh:
    build:
      context: .
      args:
        SKIP_DATA_DOWNLOAD: ${SKIP_DATA_DOWNLOAD:-1}
    profiles: ["jobs"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-taxprotest}:${POSTGRES_PASSWORD:-taxprotest}@postgres:5432/${POSTGRES_DB:-taxprotest}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-0}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-change-this-in-production}
      - HCAD_DOWNLOAD_DIR=${HCAD_DOWNLOAD_DIR:-/app/var/downloads}
      - HCAD_EXTRACT_DIR=${HCAD_EXTRACT_DIR:-/app/var/extracted}
      - HCAD_LOG_DIR=${HCAD_LOG_DIR:-/app/var/logs}
      - PROJECT_REPORT_DIR=${PROJECT_REPORT_DIR:-/app/var/reports}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py check_and_import_data

volumes:
  pgdata:
    driver: local
