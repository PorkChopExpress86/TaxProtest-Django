[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = False
warn_redundant_casts = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
disable_error_code = var-annotated,attr-defined,arg-type,assignment,operator,union-attr,index,misc,func-returns-value,import-untyped

[mypy-data.tests.*]
ignore_errors = True

[mypy-data.etl_pipeline.tests.*]
ignore_errors = True

[mypy-taxprotest.tests.*]
ignore_errors = True
