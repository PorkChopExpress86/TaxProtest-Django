[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "/migrations/"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle
  "F",  # pyflakes
  "I",  # isort
  "B",  # bugbear
  "UP", # pyupgrade
]
ignore = [
  "E203",  # whitespace before ':' (Black compatibility)
  "E501",  # line length handled pragmatically in legacy code during staged cleanup
  "B007",  # allow unused loop variables in legacy loops
  "B023",  # allow nested helpers capturing loop vars in legacy ETL code
  "B905",  # allow zip() without strict in legacy compatibility paths
  "E722",  # allow bare except in legacy ETL parsing paths
  "F841",  # allow assigned-but-unused vars during staged refactors
  "E402",  # allow deferred imports in scripts that must initialize runtime first
]
